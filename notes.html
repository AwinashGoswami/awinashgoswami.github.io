<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes — CS Study Hub</title>
  <meta name="description" content="Interactive O Level and A Level computer science notes with a responsive sidebar and rich content area." />

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Page CSS -->
  <link rel="stylesheet" href="notes.css" />
</head>
<body>

  <!-- ══ NAVBAR ══ -->
  <nav class="navbar navbar-expand-md">
    <div class="container">
      <a class="navbar-brand" href="home.html">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        CS Study Hub
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto gap-1 align-items-md-center">

          <!-- Home -->
          <li class="nav-item">
            <a class="nav-link" href="home.html">
              <i class="bi bi-house me-1"></i>Home
            </a>
          </li>

          <!-- Admin (hidden link — share privately with your password) -->
          <li class="nav-item" id="admin-nav-item" style="display:none;">
            <a class="nav-link" href="#" data-goto="blog-admin" data-navpage="blog-admin">
              <i class="bi bi-shield-lock me-1"></i>Admin
            </a>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <div id="main-content">
  <main class="notes-app">
    <section class="notes-hero">
      <div class="container">

        <h1>Notes</h1>


        <div class="notes-level-cards">
          <button type="button" class="level-card active" data-level="o-level">
            <span class="level-dot level-o"></span>
            <strong>O Level</strong>
          </button>
          <button type="button" class="level-card" data-level="a-level">
            <span class="level-dot level-a"></span>
            <strong>A Level</strong>
          </button>
        </div>

        
      </div>
    </section>

    <section class="layout container">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
          <div>
            <span class="sidebar-badge" id="sidebar-level-badge">O Level</span>
          </div>
          <button class="sidebar-close" id="sidebar-close" aria-label="Close sidebar">&times;</button>
        </div>
        <div class="sidebar-scroll" id="sidebar-list"></div>
        
      </aside>

      <section class="content-area">
        <div class="content-control">
          <button class="btn btn-outline-secondary mobile-toggle" id="mobile-sidebar-toggle"><i class="bi bi-list me-2"></i>Topics</button>
          <div class="content-header">
            <div>
              <h2 id="content-title">Decimal number system</h2>
            </div>
            <div class="content-actions">
              <button class="btn btn-secondary" id="prev-topic"><i class="bi bi-chevron-left me-1"></i>Previous</button>
              <button class="btn btn-primary" id="next-topic">Next<i class="bi bi-chevron-right ms-1"></i></button>
            </div>
          </div>
        </div>

        <article class="topic-panel">
          <div id="topic-content"></div>
        </article>

        
      </section>
    </section>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>
  </main>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Site scripts (same as home.html) -->
  <script src="assets/js/data.js"></script>
  <script>
    // lightweight navbar handler for notes.html (avoids loading full SPA)
    (function(){
      $(document).on('click', '[data-goto]', function (e) {
        const href = $(this).attr('href');
        const page = $(this).data('goto');
        const level = $(this).data('level');
        // close mobile navbar if open
        const nc = document.getElementById('navbarNav');
        if (nc && nc.classList.contains('show')) bootstrap.Collapse.getOrCreateInstance(nc).hide();
        // allow real links to navigate
        if (href && href !== '#') return;
        e.preventDefault();
        if (page) {
          $('[data-navpage]').removeClass('active');
          $('[data-navpage="' + page + '"]').addClass('active');
        }
        if (level && typeof setLevel === 'function') {
          setLevel(level);
        }
      });
    })();
  </script>
  <script src="notes.js" defer></script>
</body>
</html>
